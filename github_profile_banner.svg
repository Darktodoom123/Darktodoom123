<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <title>Aristaeus Developer Banner</title>
  <desc>A cosmic dark purple background with pulsing stars and the Cancer constellation</desc>

  <defs>
    <!-- Highly Diffused Nebula Blur Filter -->
    <filter id="nebula-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="55" />
    </filter>
  </defs>

  <style><![CDATA[
    /* CSS Keyframe Animations */
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.85; }
    }
    
    @keyframes lineDraw {
      to { stroke-dashoffset: 0; }
    }
    
    @keyframes contentFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.22; }
    }

    @keyframes innerGlowPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.45; }
    }

    /* Animation and Styling Classes */
    .star {
      fill: #e0def4;
      animation: starTwinkle 6s infinite ease-in-out;
    }
    .delay-1 { animation-delay: 1.5s; }
    .delay-2 { animation-delay: 3.0s; }
    .delay-3 { animation-delay: 4.5s; }

    .const-glow-outer {
      animation: glowPulse 8s infinite ease-in-out;
    }
    .const-glow-inner {
      animation: innerGlowPulse 8s infinite ease-in-out;
    }

    .const-line {
      stroke: oklch(85% 0.02 270 / 0.22);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: lineDraw 3s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    .line-1 { animation-delay: 0.4s; }
    .line-2 { animation-delay: 0.8s; }
    .line-3 { animation-delay: 1.2s; }
    .line-4 { animation-delay: 1.6s; }

    .animate-text {
      opacity: 0;
      animation: contentFadeIn 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    .text-title { 
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800; 
      font-size: 38px; 
      fill: oklch(98% 0.01 270);
      letter-spacing: -0.02em;
      animation-delay: 0.2s;
    }
    .text-subtitle { 
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500; 
      font-size: 15px; 
      fill: oklch(80% 0.14 195);
      letter-spacing: -0.01em;
      animation-delay: 0.5s;
    }

    /* Accessibility: Respect Reduced Motion Preferences */
    @media (prefers-reduced-motion: reduce) {
      .star, .const-line, .animate-text, .const-glow-outer, .const-glow-inner {
        animation: none !important;
        opacity: 1 !important;
        stroke-dashoffset: 0 !important;
        transform: none !important;
      }
      .const-glow-outer { opacity: 0.12 !important; }
      .const-glow-inner { opacity: 0.3 !important; }
    }
  ]]></style>

  <!-- Background Space Canvas -->
  <rect width="100%" height="100%" fill="oklch(14% 0.04 275)" />

  <!-- Static Glowing Nebulae (Highly diffused for a premium, non-neon look) -->
  <g opacity="0.18">
    <circle cx="620" cy="110" r="120" fill="oklch(62% 0.18 295)" filter="url(#nebula-blur)" />
    <circle cx="150" cy="180" r="90" fill="oklch(80% 0.14 195)" filter="url(#nebula-blur)" />
    <circle cx="400" cy="30" r="100" fill="oklch(74% 0.16 325)" filter="url(#nebula-blur)" />
  </g>

  <!-- Star Field (Static and Twinkling Background Stars) -->
  <g opacity="0.65">
    <circle cx="80" cy="40" r="1" class="star delay-1" />
    <circle cx="280" cy="70" r="1.5" class="star delay-2" />
    <circle cx="120" cy="130" r="1" class="star delay-3" />
    <circle cx="220" cy="170" r="1.5" class="star" />
    <circle cx="340" cy="120" r="1" class="star delay-1" />
    <circle cx="510" cy="40" r="1" class="star delay-2" />
    <circle cx="730" cy="60" r="1.5" class="star delay-3" />
    <circle cx="710" cy="160" r="1" class="star" />
  </g>

  <!-- Typographic Copy Block -->
  <g transform="translate(60, 85)">
    <!-- Main Display Heading -->
    <text class="animate-text text-title" y="0">ARISTAEUS</text>
    <!-- Subtitle -->
    <text class="animate-text text-subtitle" y="32">Learning Full-Stack Developer &amp; AI Explorer</text>
  </g>

  <!-- Cancer Constellation Graphics (Right-aligned) -->
  <g transform="translate(60, 0)">
    <!-- Constellation Lines -->
    <line x1="560" y1="50" x2="530" y2="105" class="const-line line-1" />
    <line x1="530" y1="105" x2="500" y2="160" class="const-line line-2" />
    <line x1="500" y1="160" x2="450" y2="200" class="const-line line-3" />
    <line x1="500" y1="160" x2="610" y2="185" class="const-line line-4" />

    <!-- Constellation Stars (Concentric Glow Layers) -->
    <!-- Alpha (Top) -->
    <g>
      <circle cx="560" cy="50" r="14" fill="oklch(80% 0.14 195)" class="const-glow-outer delay-1" />
      <circle cx="560" cy="50" r="7" fill="oklch(80% 0.14 195)" class="const-glow-inner delay-1" />
      <circle cx="560" cy="50" r="2.5" fill="oklch(98% 0.01 270)" />
    </g>
    <!-- Beta (Junction) -->
    <g>
      <circle cx="530" cy="105" r="10" fill="oklch(80% 0.14 195)" class="const-glow-outer delay-2" />
      <circle cx="530" cy="105" r="5" fill="oklch(80% 0.14 195)" class="const-glow-inner delay-2" />
      <circle cx="530" cy="105" r="2.0" fill="oklch(98% 0.01 270)" />
    </g>
    <!-- Gamma (Core - Brightest) -->
    <g>
      <circle cx="500" cy="160" r="16" fill="oklch(80% 0.14 195)" class="const-glow-outer" />
      <circle cx="500" cy="160" r="8" fill="oklch(80% 0.14 195)" class="const-glow-inner" />
      <circle cx="500" cy="160" r="3.0" fill="oklch(98% 0.01 270)" />
    </g>
    <!-- Delta (Tail) -->
    <g>
      <circle cx="450" cy="200" r="12" fill="oklch(80% 0.14 195)" class="const-glow-outer delay-3" />
      <circle cx="450" cy="200" r="6" fill="oklch(80% 0.14 195)" class="const-glow-inner delay-3" />
      <circle cx="450" cy="200" r="2.2" fill="oklch(98% 0.01 270)" />
    </g>
    <!-- Iota (Bottom Branch) -->
    <g>
      <circle cx="610" cy="185" r="10" fill="oklch(80% 0.14 195)" class="const-glow-outer delay-1" />
      <circle cx="610" cy="185" r="5" fill="oklch(80% 0.14 195)" class="const-glow-inner delay-1" />
      <circle cx="610" cy="185" r="2.0" fill="oklch(98% 0.01 270)" />
    </g>
  </g>
</svg>
