<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <title>Aristaeus Developer Banner</title>
  <desc>A cosmic dark purple background with pulsing stars and the Cancer constellation</desc>

  <defs>
    <!-- Glow and Blur Filters -->
    <filter id="nebula-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="star-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Keyframe Animations */
    @keyframes starPulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    @keyframes lineDraw {
      to { stroke-dashoffset: 0; }
    }
    
    @keyframes contentFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Animation Classes */
    .star {
      fill: #e0def4;
      transform-origin: center;
      animation: starPulse 4s infinite ease-in-out;
    }
    .star-bright {
      fill: #7accff;
      filter: url(#star-glow);
      animation: starPulse 3s infinite ease-in-out;
    }
    .delay-1 { animation-delay: 0.8s; }
    .delay-2 { animation-delay: 1.6s; }
    .delay-3 { animation-delay: 2.4s; }

    .const-line {
      stroke: oklch(62% 0.18 295 / 0.5);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: lineDraw 3s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    .line-1 { animation-delay: 0.4s; }
    .line-2 { animation-delay: 0.8s; }
    .line-3 { animation-delay: 1.2s; }
    .line-4 { animation-delay: 1.6s; }

    .animate-text {
      opacity: 0;
      animation: contentFadeIn 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1);
    }
    .text-title { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800; 
      font-size: 38px; 
      fill: oklch(98% 0.01 270);
      animation-delay: 0.2s;
    }
    .text-subtitle { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500; 
      font-size: 15px; 
      fill: oklch(80% 0.14 195);
      animation-delay: 0.5s;
    }

    /* Accessibility: Respect Reduced Motion Preferences */
    @media (prefers-reduced-motion: reduce) {
      .star, .star-bright, .const-line, .animate-text {
        animation: none !important;
        opacity: 1 !important;
        stroke-dashoffset: 0 !important;
        transform: none !important;
      }
    }
  </style>

  <!-- Background Space Canvas -->
  <rect width="100%" height="100%" fill="oklch(14% 0.04 275)" />

  <!-- Static Glowing Nebulae (Optimized: Animation removed to prevent repaint thrashing) -->
  <g opacity="0.25">
    <circle cx="620" cy="110" r="110" fill="oklch(62% 0.18 295)" filter="url(#nebula-blur)" />
    <circle cx="150" cy="180" r="80" fill="oklch(80% 0.14 195)" filter="url(#nebula-blur)" />
    <circle cx="400" cy="30" r="90" fill="oklch(74% 0.16 325)" filter="url(#nebula-blur)" />
  </g>

  <!-- Star Field (Static and Pulsing Background Stars) -->
  <g opacity="0.6">
    <circle cx="80" cy="40" r="1" class="star star-1 delay-1" />
    <circle cx="280" cy="70" r="1.5" class="star star-2 delay-2" />
    <circle cx="120" cy="130" r="1" class="star star-3 delay-3" />
    <circle cx="220" cy="170" r="1.5" class="star star-1" />
    <circle cx="340" cy="120" r="1" class="star star-2 delay-1" />
    <circle cx="510" cy="40" r="1" class="star star-3 delay-2" />
    <circle cx="730" cy="60" r="1.5" class="star star-1 delay-3" />
    <circle cx="710" cy="160" r="1" class="star star-2" />
  </g>

  <!-- Typographic Copy Block (Shifted upward to compensate for removed eyebrow badge) -->
  <g transform="translate(60, 85)">
    <!-- Main Display Heading -->
    <text class="animate-text text-title" y="0">ARISTAEUS</text>
    <!-- Subtitle -->
    <text class="animate-text text-subtitle" y="32">Learning Full-Stack Developer &amp; AI Explorer</text>
  </g>

  <!-- Cancer Constellation Graphics (Right-aligned, x=580 to x=680) -->
  <g transform="translate(60, 0)">
    <!-- Constellation Lines -->
    <line x1="560" y1="50" x2="530" y2="105" class="const-line line-1" />
    <line x1="530" y1="105" x2="500" y2="160" class="const-line line-2" />
    <line x1="500" y1="160" x2="450" y2="200" class="const-line line-3" />
    <line x1="500" y1="160" x2="610" y2="185" class="const-line line-4" />

    <!-- Constellation Stars -->
    <!-- Alpha (Top) -->
    <circle cx="560" cy="50" r="4.5" class="star-bright" />
    <!-- Beta (Junction) -->
    <circle cx="530" cy="105" r="3.5" class="star-bright delay-1" />
    <!-- Gamma (Core) -->
    <circle cx="500" cy="160" r="5" class="star-bright delay-2" />
    <!-- Delta (Tail) -->
    <circle cx="450" cy="200" r="4" class="star-bright delay-3" />
    <!-- Iota (Bottom Branch) -->
    <circle cx="610" cy="185" r="3.5" class="star-bright delay-1" />
  </g>
</svg>
