name: Refresh GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Stats SVGs with Error Check
        run: |
          mkdir -p stats
          
          # Fetch Stats Card
          curl -s "https://github-readme-stats-eight-theta.vercel.app/api?username=Darktodoom123&show_icons=true&title_color=c4a7e7&icon_color=9ccfd8&text_color=e0def4&bg_color=191724&hide_border=true&count_private=true" -o temp-stats.svg
          if grep -q "Something went wrong" temp-stats.svg || grep -q "rate limit" temp-stats.svg; then
            echo "Stats card is currently rate-limited. Skipping update to preserve existing cache."
          else
            mv temp-stats.svg stats/github-stats.svg
            echo "Stats card successfully updated."
          fi
          
          # Fetch Languages Card
          curl -s "https://github-readme-stats-eight-theta.vercel.app/api/top-langs?username=Darktodoom123&layout=compact&title_color=c4a7e7&icon_color=9ccfd8&text_color=e0def4&bg_color=191724&hide_border=true" -o temp-langs.svg
          if grep -q "Something went wrong" temp-langs.svg || grep -q "rate limit" temp-langs.svg; then
            echo "Top Languages card is currently rate-limited. Skipping update to preserve existing cache."
          else
            mv temp-langs.svg stats/github-top-langs.svg
            echo "Top Languages card successfully updated."
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/github-stats.svg stats/github-top-langs.svg || true
          git diff-index --quiet HEAD || git commit -m "chore: refresh github profile stats cards"
          git push
